# Self-fleet secretary — operates on the orca repo itself.
# Spawn via `task dev:self-fleet` from the orca repo root.
id: secretary
role: "Communicator — bridge relay for Slack. Routes engineering tasks against the orca codebase."
runtime: claude-code-local
role_template: communicator
runtime_opts:
  model: claude-sonnet-4-6
  permission_mode: bypassPermissions
workdir: .
tags: [communicator, intake]
skills:
  - orca_comms
system_prompt_file: ./examples/prompts/self/secretary.md
budget:
  max_input_tokens: 5000000
  on_breach: warn
